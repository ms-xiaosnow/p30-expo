name: Build Custom iOS Dev Client (Unsigned IPA)
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许网页端手动点击运行

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 选择 Xcode 15.4 (预装 iOS 17 SDK，不需要下载平台包)
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.2.app || echo "Using default Xcode"
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos
          
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: 安装项目依赖 (npm 降维打击模式)
        run: npm install --legacy-peer-deps
        
      - name: 注入蓝牙原生配置 (Expo Prebuild)
        run: npx expo prebuild --platform ios --clean
        
      - name: 安装底层的 iOS CocoaPods
        run: cd ios && pod install
        
      - name: 无签名暴力编译出 iOS App
        run: |
          WORKSPACE_NAME=$(ls ios | grep xcworkspace)
          SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)
          set -o pipefail
          # 关键：不在 CLI 传 CODE_SIGNING_ALLOWED=No（否则会覆盖 Podfile 里对 RCTSwiftUI 的豁免）
          # 签名禁用由 withDisableCodeSigning.js 的 Podfile post_install 精细化控制
          xcodebuild -workspace ios/$WORKSPACE_NAME \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_REQUIRED=No \
            CODE_SIGNING_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build \
            CONFIGURATION_BUILD_DIR=$PWD/build 2>&1 | tee xcodebuild.log
            
      - name: 紧急提取底层崩溃日志 (永远执行)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Crash-Log
          path: xcodebuild.log
          
      - name: 疯狂内卷组装成纯净版 .ipa 安装包
        run: |
          mkdir -p Payload
          mv build/*.app Payload/
          zip -r p30-client-unsigned.ipa Payload
          
      - name: 抛出给大佬体验！(下载回 Windows 即可用来 Sideload)
        uses: actions/upload-artifact@v4
        with:
          name: P30-iOS-Client
          path: p30-client-unsigned.ipa
          retention-days: 7
