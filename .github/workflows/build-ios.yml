name: Build Custom iOS Dev Client (Unsigned IPA)
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许网页端手动点击运行

jobs:
  build:
    runs-on: macos-15 # 白嫖最高级版本 macOS 15，自带 Xcode 16
    steps:
      - name: 强行挂载 Xcode 16.1 引擎 (绕过 RN 强制编译器版本检测)
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app || sudo xcode-select -s /Applications/Xcode_16.2.app || echo "Using default Xcode"
          xcodebuild -version
          
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: 安装项目依赖 (npm 降维打击模式)
        run: npm install --legacy-peer-deps
        
      - name: 注入蓝牙原生配置 (Expo Prebuild)
        run: npx expo prebuild --platform ios --clean
        
      - name: 安装底层的 iOS CocoaPods
        run: cd ios && pod install
        
      - name: 无签名暴力编译出 iOS App (终极破解绕过 688元保护费)
        run: |
          WORKSPACE_NAME=$(ls ios | grep xcworkspace)
          SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)
          # 添加极端防线：移除一切必须依赖开发者团队和证书检查的环境变量！
          set -o pipefail
          xcodebuild -workspace ios/$WORKSPACE_NAME \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=No \
            CODE_SIGNING_REQUIRED=No \
            CODE_SIGNING_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build \
            CONFIGURATION_BUILD_DIR=$PWD/build 2>&1 | tee xcodebuild.log
            
      - name: 紧急提取底层崩溃日志 (永远执行)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Crash-Log
          path: xcodebuild.log
          
      - name: 疯狂内卷组装成纯净版 .ipa 安装包
        run: |
          mkdir -p Payload
          mv build/*.app Payload/
          zip -r p30-client-unsigned.ipa Payload
          
      - name: 抛出给大佬体验！(下载回 Windows 即可用来 Sideload)
        uses: actions/upload-artifact@v4
        with:
          name: P30-iOS-Client
          path: p30-client-unsigned.ipa
          retention-days: 7
